{% extends "base.html" %}

{% block title %}Lost in Space?{% endblock %}

{% block content %}
<div class="container mt-5 text-center">
    <h1 class="display-1">404</h1>
    <h2>Uh‑oh! Looks like you took a wrong turn.</h2>
    <p>The page you’re looking for has either vanished into the void or never existed.</p>

    <img src="https://media.giphy.com/media/14uQ3cOFteDaU/giphy.gif"
         alt="Lost astronaut"
         style="max-width:300px; border-radius: 10px;">

    <p class="mt-4">
        You can
        <a href="{% if user.is_authenticated %}{% url 'room_list' %}{% else %}{% url 'home' %}{% endif %}">
            head back to safety
        </a>
        and continue your adventure.
    </p>
</div>
{% endblock %}
